title: Syllabus AI Checker
description: シラバス CSV の AI チェック、設定、履歴管理のためのドキュメント
lang: ja
url: 'https://haselab-dev.github.io'
baseurl: '/sysllabus-ai-checker-docs'
remote_theme: kitian616/jekyll-TeXt-theme
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-remote-theme
sources: unpkg
text_skin: default
highlight_theme: default
repository: haselab-dev/sysllabus-ai-checker-docs
repository_tree: main/docs
toc:
  selectors: 'h1,h2,h3'
defaults:
  - scope:
      path: ''
      type: pages
    values:
      layout: article
      sidebar:
        nav: docs
      aside:
        toc: true
  - scope:
      path: 'getting-started'
      type: pages
    values:
      nav_key: docs
  - scope:
      path: 'reference'
      type: pages
    values:
      nav_key: reference
  - scope:
      path: 'reference/index.md'
      type: pages
    values:
      aside:
        toc: false
  - scope:
      path: 'search.md'
      type: pages
    values:
      aside:
        toc: false
