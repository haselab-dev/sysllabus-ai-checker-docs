<script>
	window.DOCS_SEARCH_DATA_URL = {{ '/assets/search.js' | relative_url | jsonify }};
	window.DOCS_SEARCH_PAGE_URL = {{ '/search/' | relative_url | jsonify }};
	window.DOCS_BASEURL = {{ site.baseurl | jsonify }};
	window.DOCS_PAGE_URL = {{ page.url | jsonify }};
	window.DOCS_SIDEBAR_NAV = {{ page.sidebar.nav | jsonify }};
	window.DOCS_NAVIGATION = {{ site.data.navigation | jsonify }};

	(function () {
		var platform = '';

		if (navigator.userAgentData && navigator.userAgentData.platform) {
			platform = navigator.userAgentData.platform;
		} else {
			platform = navigator.platform || navigator.userAgent || '';
		}

		platform = String(platform).toLowerCase();

		if (
			platform.indexOf('mac') !== -1 ||
			platform.indexOf('iphone') !== -1 ||
			platform.indexOf('ipad') !== -1 ||
			platform.indexOf('ipod') !== -1
		) {
			window.DOCS_SEARCH_SHORTCUT = {
				hint: 'Mac „ĀĮ ‚ĆėK „Āß„āāťĖč„ĀĎ„Āĺ„Āô„Äā',
				label: '‚ĆėK',
				title: 'Mac „ĀĮ Command+K „Āßś§úÁīĘ„āíťĖč„ĀĎ„Āĺ„Āô'
			};
			document.documentElement.setAttribute('data-docs-shortcut', 'apple');
			return;
		}

		window.DOCS_SEARCH_SHORTCUT = {
			hint: 'Windows / Linux „ĀĮ Ctrl+K „Āß„āāťĖč„ĀĎ„Āĺ„Āô„Äā',
			label: 'Ctrl+K',
			title: 'Windows / Linux „ĀĮ Ctrl+K „Āßś§úÁīĘ„āíťĖč„ĀĎ„Āĺ„Āô'
		};
		document.documentElement.setAttribute('data-docs-shortcut', 'default');
	})();
</script>
